<body>
  <h1>リストの使い分け</h1>
  <h2>&lt;ol&gt;</h2>
  <ol>
    <li>卵を割りほぐし、調味料を加える</li>
    <li>玉子焼き器に卵液を１/４量を入れて広げる</li>
    <li>半熟状になったら手前に巻き、奥に移動させる</li>
    <li>これを繰り返し、最後まで焼けたら完成</li>
  </ol>   
  
  <h2>&lt;ul&gt;</h2>
    <ul>卵(３個)</ul>
    <ul>しょうゆ(大さじ１)</ul>
    <ul>みりん(大さじ１)</ul>
    <ul>塩(少々)</ul>

</body>
